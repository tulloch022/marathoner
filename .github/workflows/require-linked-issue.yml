name: Require linked issue

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  linked-issue:
    name: Linked issue
    runs-on: ubuntu-latest
    steps:
      - name: Verify closing issue reference
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          references="$(
            printf '%s' "$PR_BODY" |
              grep -Eio '(close[sd]?|fix(e[sd])?|resolve[sd]?) +#[0-9]+' || true
          )"

          if [[ -z "$references" ]]; then
            echo "::error::Add Closes #<issue>, Fixes #<issue>, or Resolves #<issue> to the pull request body."
            exit 1
          fi

          issue_numbers="$(
            printf '%s' "$references" | grep -Eo '[0-9]+' | sort -u
          )"

          for issue_number in $issue_numbers; do
            if ! response="$(
              curl --fail-with-body --silent --show-error \
                --header "Authorization: Bearer $GH_TOKEN" \
                --header "Accept: application/vnd.github+json" \
                --header "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/$REPOSITORY/issues/$issue_number"
            )"; then
              continue
            fi

            if [[ "$(printf '%s' "$response" | jq -r '.pull_request == null and .state == "open"')" == "true" ]]; then
              echo "Pull request closes open issue #$issue_number."
              exit 0
            fi
          done

          echo "::error::The pull request must close an existing open issue in this repository."
          exit 1
